<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Finovo</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #f5f7fa;
        --card: #ffffff;
        --border: #e5e7eb;
        --heading: #111827;
        --body: #6b7280;
        --sub: #4b5563;
        --primary: #22c55e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Figtree, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--heading);
      }
      .wrap { max-width: 1200px; margin: 0 auto; padding: 48px 24px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 48px 24px; text-align: center; }
      h1 { margin: 8px 0 0; font-size: clamp(34px, 5vw, 44px); line-height: 1.1; }
      p { margin: 12px auto 0; max-width: 720px; color: var(--body); line-height: 1.6; }
      .code { color: var(--sub); font-weight: 600; margin: 0; }
      .links { margin-top: 28px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
      .btn { min-width: 170px; text-decoration: none; padding: 11px 18px; border-radius: 10px; border: 1px solid var(--border); color: #1d2433; background: #fff; font-weight: 500; }
      .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <p class="code">404</p>
        <h1>Page Not Found</h1>
        <p>
          The page you are looking for may have been moved, deleted, or is temporarily unavailable.
          Continue with one of the links below.
        </p>
        <div class="links">
          <a class="btn primary" href="/">Homepage</a>
          <a class="btn" href="/finance">Calculators</a>
          <a class="btn" href="/blogs">Blog</a>
        </div>
      </section>
    </main>
  </body>
</html>
